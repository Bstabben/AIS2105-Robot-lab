# RGB colour ranges for cube detection.
# Values are [R, G, B], each 0-255.
# Use any colour picker to sample the cube colour, then build a window around it.

detection_node:
  ros__parameters:
    min_contour_area: 500        # px², smaller blobs are ignored
    publish_debug_image: true    # publish annotated image on vision/debug_image

    rgb:
      red:
        range0:
          lower: [150,   0,   0]
          upper: [255, 100, 100]
      green:
        range0:
          lower: [  0,  80,   0]
          upper: [100, 255, 100]
      blue:
        range0:
          lower: [  0,   0, 100]
          upper: [100, 100, 255]
