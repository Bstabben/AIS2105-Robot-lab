# HSV colour ranges for cube detection.
# Values are [H, S, V]: H 0-180, S 0-255, V 0-255 (OpenCV convention).
# Red wraps around 0°/180° in OpenCV HSV, so it uses two ranges.

detection_node:
  ros__parameters:
    min_contour_area: 500        # px², smaller blobs are ignored
    publish_debug_image: true    # publish annotated image on vision/debug_image

    hsv:
      red:
        range0:
          lower: [  0, 120,  70]
          upper: [ 10, 255, 255]
        range1:
          lower: [170, 120,  70]
          upper: [180, 255, 255]
      green:
        range0:
          lower: [ 35,  80,  50]
          upper: [ 85, 255, 255]
      blue:
        range0:
          lower: [100, 150,  50]
          upper: [130, 255, 255]
