# RGB colour ranges for cube detection.
# Values are [R, G, B], each 0-255.
# Use any colour picker to sample the cube colour, then build a window around it.

detection_node:
  ros__parameters:
    min_contour_area: 500        # px², smaller blobs are ignored
    publish_debug_image: true    # publish annotated image on vision/debug_image

    rgb:
      red:
        range0:
          lower: [150,   0,   0]
          upper: [255, 100, 100]
      # !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
      # KNOWN BUG: these ranges are too wide — the table surface is falsely
      # detected as both green and blue under current lab lighting.
      # Tightening the non-dominant channel ceilings below 120 kills detection
      # of the washed cubes.  This needs proper per-lighting calibration or a
      # switch back to HSV before the next real run.
      # !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
      green:
        range0:
          lower: [  0,  80,   0]
          upper: [120, 255, 120]
      blue:
        range0:
          lower: [  0,   0,  90]
          upper: [120, 120, 255]
